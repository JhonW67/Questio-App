spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.profiles.active=test

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=false

# 32 bytes (base64) - apenas para testes
api.security.token.secret=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
api.security.token.expiration-ms=7200000

# Necessário para a auto-config do JavaMailSender (fase 3 - e-mail)
spring.mail.host=localhost
spring.mail.port=2525
app.frontend.url=http://localhost:8081
app.password-reset.url=questio-app://screens/(Authenticator)/ResetPassWord
app.cors.allowed-origins=http://localhost:8081,http://localhost:8082
app.mail.from=nao-responda@questio.com
