services:
  - type: web
    name: questio-backend
    runtime: docker
    rootDir: questio-backend - Copia
    dockerfilePath: questio-backend - Copia/Dockerfile
    dockerContext: questio-backend - Copia
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: API_SECURITY_TOKEN_EXPIRATION_MS
        value: 7200000
      - key: APP_FRONTEND_URL
        sync: false
      - key: APP_PASSWORD_RESET_URL
        value: questio-app://screens/(Authenticator)/ResetPassWord
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_MAIL_FROM
        sync: false
      - key: APP_MAIL_FROM_NAME
        value: Questio
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: API_SECURITY_TOKEN_SECRET
        generateValue: true
      - key: BREVO_API_BASE_URL
        value: https://api.brevo.com/v3
      - key: BREVO_API_KEY
        sync: false
      - key: QUESTIO_SCHEDULING_RESET_STREAK_ENABLED
        value: "true"
